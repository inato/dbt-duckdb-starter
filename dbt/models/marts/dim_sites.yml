version: 2

models:
  - name: sites_mart
    description: >
      Site dimension table. One row per research center.
      Sites are located in one country and can participate in multiple trials.
    columns:
      - name: site_id
        description: Primary key. Unique identifier for the research site (e.g. si_0001).
      - name: siteName
        description: Full name of the research center (e.g. "Smith LLC Research Center").
      - name: countryCode
        description: ISO 3166-1 alpha-2 country code where the site operates (e.g. US, FR, DE).
      - name: country_name
        description: Full English name of the country where the site operates.
